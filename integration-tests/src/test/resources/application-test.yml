spring:
  application:
    name: integrix-flow-bridge-tests
  
  datasource:
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        show_sql: false
    open-in-view: false
  
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  
  security:
    jwt:
      secret-key: IntegrixFlowBridge2024TestSecretKey
      expiration: 3600000
      refresh-expiration: 86400000
  
  cache:
    type: simple

# Logging
logging:
  level:
    root: WARN
    com.integrixs: INFO
    org.springframework.web: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
    org.testcontainers: INFO

# Integrix specific
integrix:
  master-key: IntegrixFlowBridge2024TestMasterKey
  encryption:
    enabled: true
    algorithm: AES
  
  file:
    upload-dir: /tmp/integrix-test-uploads
    max-size: 10MB
  
  async:
    core-pool-size: 2
    max-pool-size: 5
    queue-capacity: 100

# Monitoring
monitoring:
  enabled: false
  metrics:
    export:
      enabled: false